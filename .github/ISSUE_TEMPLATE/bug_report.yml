name: Bug report
description: Report a problem to help us improve vLite
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: markdown
    attributes:
      value: |
        Issues that don't follow this template will be closed.
        Please provide as much detail as possible to help reproduce the issue.

  - type: input
    id: version
    attributes:
      label: vLite version
      placeholder: "e.g. 5.0.0"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device if relevant
      placeholder: "Chrome 123 / macOS 14"
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Bug description
      description: What is happening?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: minimal_repro
    attributes:
      label: Minimal reproduction (code or link)
      description: Provide a CodeSandbox / StackBlitz / snippet if possible
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker
        - critical
        - medium
        - low
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false